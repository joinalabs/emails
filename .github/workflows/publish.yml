name: Publish to GitHub Packages

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-publish
  cancel-in-progress: true

# Publish to npm.pkg.github.com using the workflow GITHUB_TOKEN (no npmjs account or NPM_TOKEN).
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Link to package on GitHub
        if: success()
        run: |
          echo "If publish succeeded, open this repo’s npm package page:"
          echo "https://github.com/${GITHUB_REPOSITORY}/pkgs/npm/emails"
          echo "(The org list filtered by repo_name= can stay empty until a linked package exists or filters match.)"
